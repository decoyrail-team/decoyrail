name: Release

# Manual release: build the macOS arm64 binary, then tag and publish a GitHub
# release with checksums. Trigger from the Actions tab when you want to ship.
#
# The decoyrail.com site (download page, embedded tarball) is deployed
# separately; it pins the release published here by its sha256.

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        id: version
        run: |
          version="$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.version.outputs.version }}" > /dev/null; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in Cargo.toml first."
            exit 1
          fi

  build:
    needs: check
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          version="${{ needs.check.outputs.version }}"
          name="decoyrail-v${version}-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/decoyrail" "$name/"
          cp README.md LICENSE "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: decoyrail-${{ matrix.target }}
          path: |
            decoyrail-*.tar.gz
            decoyrail-*.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ needs.check.outputs.version }}"
          gh release create "v${version}" dist/* \
            --target "$GITHUB_SHA" \
            --title "decoyrail v${version}" \
            --generate-notes
